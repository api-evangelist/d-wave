name: D-Wave Solver Discovery
description: |
  Discover, inspect, and filter the D-Wave solvers available to the authenticated Leap
  project — QPUs (Advantage, Advantage2) and hybrid solvers (BQM, CQM, DQM, NL).
api: d-wave-solver-api
version: '0.1'
operations:
- id: list_solvers
  method: GET
  path: /solvers/remote/
  description: List all solvers visible to the project, with optional filter expression.
- id: get_solver
  method: GET
  path: /solvers/remote/{solver_name}
  description: Retrieve full configuration and properties for a single solver.
inputs:
- name: solver_name
  type: string
  description: Solver identifier (e.g. Advantage_system6.4, hybrid_nonlinear_program_v1).
- name: filter
  type: string
  description: Optional filter expression (e.g. `none,+id,+properties.category`).
outputs:
- name: solvers
  type: array
  description: List of SolverConfiguration objects with status, category, supported_problem_types, properties.
