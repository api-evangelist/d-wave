name: D-Wave Problem Submission
description: |
  Submit Ising, QUBO, BQM, CQM, DQM, or NL problems to D-Wave QPU and hybrid solvers
  through the SAPI Problems endpoint. Supports single blocking submission and batch
  asynchronous submission with up to 1,000 problems per batch status poll.
api: d-wave-problems-api
version: '0.1'
operations:
- id: submit_problem
  method: POST
  path: /problems/
  description: Blocking single-problem submit; returns final status and answer if completed within server time limit.
- id: submit_problems
  method: POST
  path: /problems/
  description: Multi-problem async submit; returns initial statuses for each problem.
- id: cancel_problem
  method: DELETE
  path: /problems/{problem_id}
- id: cancel_problems
  method: DELETE
  path: /problems/
inputs:
- name: solver
  type: string
- name: type
  type: string
  enum: [ising, qubo, bqm, cqm, dqm, nl]
- name: data
  type: object
- name: params
  type: object
  description: Solver-specific parameters (num_reads, annealing_time, time_limit, chain_strength, etc.).
- name: label
  type: string
outputs:
- name: problem_id
  type: string
- name: status
  type: string
- name: answer
  type: object
