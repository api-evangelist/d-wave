name: Leap Hybrid Nonlinear Solver
description: |
  Submit Nonlinear (NL) models — the flagship Industrial Optimization formulation backed
  by dwave-optimization — to the Leap hybrid NL solver. Designed for scheduling, routing,
  packing, assignment, and similar industrial workloads at scale.
api: d-wave-hybrid-solvers
version: '0.1'
operations:
- id: submit_nl
  method: POST
  path: /problems/
  description: Submit an NL job. Set solver=hybrid_nonlinear_program_v1 and type=nl.
inputs:
- name: nl_model
  type: object
  description: dwave.optimization.Model serialized via Model.to_file() / Model.from_file().
- name: time_limit
  type: number
  description: Solver wall-clock time limit in seconds. Minimum derived from model size.
- name: label
  type: string
outputs:
- name: problem_id
  type: string
- name: answer
  type: object
  description: Binary-ref answer pointer; download via SAPI-token auth and deserialize back to the model.
