name: Leap Hybrid CQM Solver
description: |
  Submit Constrained Quadratic Models (CQM) — objective plus equality / inequality
  constraints over binary, integer, and real variables — to the Leap hybrid CQM solver.
  Supports up to ~500K variables and 100K constraints, with a minimum time_limit derived
  from problem size.
api: d-wave-hybrid-solvers
version: '0.1'
operations:
- id: submit_cqm
  method: POST
  path: /problems/
  description: Submit a CQM job. Set solver=hybrid_constrained_quadratic_model_version1p and type=cqm.
inputs:
- name: cqm
  type: object
  description: dimod.ConstrainedQuadraticModel serialized to bq format.
- name: time_limit
  type: number
  description: Solver wall-clock time limit in seconds.
- name: label
  type: string
outputs:
- name: problem_id
  type: string
- name: answer
  type: object
  description: SampleSet with feasibility, energies, num_occurrences, and per-constraint slack.
