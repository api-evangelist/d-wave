name: D-Wave Metadata Region Discovery
description: |
  Discover Leap regions and their per-region SAPI base URLs. Used as the routing front-end
  to pick the correct SAPI cluster (e.g. na-west-1, eu-central-1) for a problem submission.
api: d-wave-metadata-api
version: '0.1'
operations:
- id: list_regions
  method: GET
  path: /regions/
- id: get_region
  method: GET
  path: /regions/{code}
inputs:
- name: code
  type: string
  description: Region code (e.g. na-west-1).
outputs:
- name: regions
  type: array
  description: List of Region objects with code, name, endpoint.
