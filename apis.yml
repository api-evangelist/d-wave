position: Consuming
description: >-
  D-Wave Quantum Inc. (NYSE: QBTS) is the leader in commercial quantum annealing computing and developer of the
  Advantage and Advantage2 quantum systems. D-Wave's Leap quantum cloud service provides real-time access to D-Wave QPUs
  and to the Leap hybrid solver family (BQM, CQM, DQM, NL) capable of solving industrial optimization problems with up
  to ~2 million variables and constraints. The open-source Ocean SDK — dimod, dwave-system, dwave-cloud-client,
  dwave-hybrid, dwave-samplers, dwave-optimization, minorminer, dwave-inspector, and 40+ companion packages — provides
  the canonical developer experience, with the underlying Solver API (SAPI) exposed as a versioned REST interface for
  solver discovery, problem submission, status polling, answer retrieval, and cancellation. Companion APIs include the
  Metadata API for region discovery and the Leap Account API for OAuth-based project and token management.
